# Example agent config used by `make demo`.
# Real installations override via env vars (see README.md §Quick start).

project_id: ""   # set via SUPPORTLY_PROJECT_ID env var
api_key: ""      # set via SUPPORTLY_API_KEY env var
api_endpoint: "http://localhost:8002/api/v1/ingest/events"

sources:
  - type: file
    enabled: true
    paths:
      - /tmp/supportly-agent-demo/app.log
