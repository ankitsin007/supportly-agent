{{- /*
Only create a Secret when the user didn't point us at an existing one.
Production deployments often manage Secrets via SealedSecrets / external-
secrets-operator, so we make this opt-in.
*/ -}}
{{- if not .Values.existingSecret }}
{{- if and .Values.projectId .Values.apiKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supportly-agent.secretName" . }}
  labels:
    {{- include "supportly-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  project-id: {{ .Values.projectId | quote }}
  api-key: {{ .Values.apiKey | quote }}
{{- end }}
{{- end }}
